apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-rcabench-config
data:
  config.prod.toml: |
    name = "{{ .Values.configmap.name }}"
    version = "{{ .Values.configmap.version }}"
    port = {{ .Values.configmap.port }}
    workspace = "{{ .Values.configmap.workspace }}"

    [system]
    timezone = "{{ .Values.configmap.system.timezone }}"

    [initialization]
    data_path = "{{ .Values.configmap.initialization.data_path }}"

    [database.mysql]
    host = "{{ .Release.Name }}-mysql"
    port = "{{ .Values.configmap.database.mysql.port }}"
    user = "{{ .Values.configmap.database.mysql.user }}"
    password = "{{ .Values.configmap.database.mysql.password }}"
    db = "{{ .Values.configmap.database.mysql.db }}"

    [jaeger]
    endpoint = "{{ .Release.Name }}-jaeger:4318"

    [redis]
    host = "{{ .Release.Name }}-redis:6379"

    [etcd]
    endpoints = ["http://{{ .Release.Name }}-etcd-headless:2379"]
    username = "{{ .Values.configmap.etcd.username }}"
    password = "{{ .Values.configmap.etcd.password }}"

    [k8s]
    namespace = "{{ .Values.configmap.k8s.namespace }}"
    [k8s.service]
    internal_url = "http://{{ .Release.Name }}-exp:8080"
    [k8s.init_container]
    {{- range $key, $value := .Values.configmap.k8s.init_container }}
    {{ $key }} = {{ $value | quote }}
    {{- end }}
    [k8s.job.service_account]
    name = "{{ .Release.Name }}-sa"
    {{- range $key, $value := .Values.configmap.k8s.job.volume_mount }}
    [k8s.job.volume_mount.{{ $key }}]
    name = {{ $value.name | quote }}
    {{- if $value.mount_path }}
    mount_path = {{ $value.mount_path | quote }}
    {{- end }}
    {{- if $value.host_path }}
    host_path = {{ $value.host_path | quote }}
    type = {{ $value.type | quote }}
    {{- end }}
    {{- if $value.source_type }}
    source_type = {{ $value.source_type | quote }}
    {{- end }}
    {{- if $value.sub_path }}
    sub_path = {{ $value.sub_path | quote }}
    {{- end }}
    {{- if $value.secret_name }}
    secret_name = {{ $value.secret_name | quote }}
    {{- end }}
    {{- if $value.claim_name }}
    claim_name = {{ $value.claim_name | quote }}
    {{- end }}
    {{- end }}

    [logging]
    dir = "{{ .Values.configmap.logging.dir }}"
    [logging.job]
    dir = "{{ .Values.configmap.logging.job.dir }}"

    [jfs]
    dataset_path = "{{ .Values.configmap.jfs.dataset_path }}"
    experiment_storage_path = "{{ .Values.configmap.jfs.experiment_storage_path }}"

    [container]
    storage_path = "{{ .Values.configmap.container.storage_path }}"

    [buildkit]
    address = "{{ .Release.Name }}-buildkit:1234"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-buildkit-config
data:
  buildkitd.toml: |
    debug = true
    trace = false
    insecure-entitlements = ["security.insecure"]

    [grpc]
    address = ["tcp://0.0.0.0:1234"]

    {{- if .Values.harbor.enabled }}
    [registry."10.10.10.240"]
    http = false
    ca = ["/usr/local/share/ca-certificates/harbor.lab.pj.crt"]
    {{- else }}
    [registry."pair-diag-cn-guangzhou.cr.volces.com/pair"]
    http = false
    {{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-initial-data
data:
  data.yaml: |
{{- if .Values.initialDataFiles.data_yaml }}
{{ .Values.initialDataFiles.data_yaml | indent 4 }}
{{- else }}
{{ .Files.Get "files/initial_data/data.yaml" | indent 4 }}
{{- end }}
  otel-demo.yaml: |
{{- if .Values.initialDataFiles.otel_demo_yaml }}
{{ .Values.initialDataFiles.otel_demo_yaml | indent 4 }}
{{- else }}
{{ .Files.Get "files/initial_data/otel-demo.yaml" | indent 4 }}
{{- end }}
  ts.yaml: |
{{- if .Values.initialDataFiles.ts_yaml }}
{{ .Values.initialDataFiles.ts_yaml | indent 4 }}
{{- else }}
{{ .Files.Get "files/initial_data/ts.yaml" | indent 4 }}
{{- end }}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-etcd-producer-config
data:
  etcd.yaml: |
{{ include "helm.etcd.mergedConfig" (dict "root" . "configType" "producer") | indent 4 }}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-etcd-consumer-config
data:
  etcd.yaml: |
{{ include "helm.etcd.mergedConfig" (dict "root" . "configType" "consumer") | indent 4 }}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-system-helm-configs
data:
  system_helm_configs.json: |
{{ include "helm.systemHelmConfigs" . | indent 4 }}
{{- if .Values.alloy.enabled }}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-alloy-config
  namespace: {{ .Values.configmap.k8s.namespace }}
data:
  config.alloy: |
    // ============================================================
    // Grafana Alloy - RCABench Log Collection Pipeline
    // Replaces: Filebeat (collection) + Logstash (processing/routing)
    // ============================================================

    // 1. Discover K8s pods on this node
    discovery.kubernetes "pods" {
      role = "pod"

      selectors {
        role  = "pod"
        field = "spec.nodeName=" + coalesce(env("HOSTNAME"), constants.hostname)
      }
    }

    // 2. Relabel: filter by rcabench labels, extract metadata
    discovery.relabel "rcabench_pods" {
      targets = discovery.kubernetes.pods.targets

      // Keep only pods with job_name label
      rule {
        source_labels = ["__meta_kubernetes_pod_label_job_name"]
        action        = "keep"
        regex         = ".+"
      }

      // Keep only pods with rcabench_app_id label
      rule {
        source_labels = ["__meta_kubernetes_pod_label_rcabench_app_id"]
        action        = "keep"
        regex         = ".+"
      }

      // Extract labels
      rule {
        source_labels = ["__meta_kubernetes_pod_label_job_name"]
        target_label  = "job_id"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_label_rcabench_app_id"]
        target_label  = "rcabench_app_id"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_label_trace_id"]
        target_label  = "trace_id"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_label_task_id"]
        target_label  = "task_id"
      }

      // Set __path__ for log file discovery
      rule {
        source_labels = ["__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
        target_label  = "__path__"
        separator     = "/"
        replacement   = "/var/log/pods/*$1/$2/*.log"
      }
    }

    // 3. Match log files on node filesystem
    local.file_match "pods" {
      path_targets = discovery.relabel.rcabench_pods.output
    }

    // 4. Read log files (tail)
    loki.source.file "pods" {
      targets    = local.file_match.pods.targets
      forward_to = [loki.process.pipeline.receiver]
    }

    // 5. Process log lines
    //    High-cardinality fields → Structured Metadata (not stream labels)
    //    Query via LogQL: {app="rcabench"} | trace_id="xxx" | task_id="yyy"
    loki.process "pipeline" {
      stage.cri {}

      // Move high-cardinality labels to Loki Structured Metadata
      stage.structured_metadata {
        values = {
          trace_id = "",
          task_id  = "",
          job_id   = "",
        }
      }

      // Drop high-cardinality + internal labels from stream labels
      stage.label_drop {
        values = ["trace_id", "task_id", "job_id", "filename"]
      }

      stage.static_labels {
        values = {
          app = "rcabench",
        }
      }

      forward_to = [loki.write.default.receiver]
    }

    // 6. Write to Loki
    loki.write "default" {
      endpoint {
        url = "{{ .Values.alloy.lokiUrl }}"
      }
    }
{{- end }}