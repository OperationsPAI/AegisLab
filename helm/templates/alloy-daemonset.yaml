{{- if .Values.alloy.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-alloy
  namespace: {{ .Values.configmap.k8s.namespace }}
  labels:
    app: alloy
    release: {{ .Release.Name }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-alloy-role
  labels:
    app: alloy
    release: {{ .Release.Name }}
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces", "nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-alloy-rolebinding
  labels:
    app: alloy
    release: {{ .Release.Name }}
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-alloy
    namespace: {{ .Values.configmap.k8s.namespace }}
roleRef:
  kind: ClusterRole
  name: {{ .Release.Name }}-alloy-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .Release.Name }}-alloy
  namespace: {{ .Values.configmap.k8s.namespace }}
  labels:
    app: alloy
    release: {{ .Release.Name }}
spec:
  selector:
    matchLabels:
      app: alloy
  template:
    metadata:
      labels:
        app: alloy
    spec:
      serviceAccountName: {{ .Release.Name }}-alloy
      {{- with .Values.alloy.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: alloy
          image: {{ include "helm.image" (dict "imageConfig" .Values.images.alloy "global" .Values.global) }}
          args:
            - run
            - /etc/alloy/config.alloy
            - --stability.level=generally-available
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            runAsUser: 0
          {{- with .Values.alloy.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: varlogcontainers
              mountPath: /var/log/containers
              readOnly: true
            - name: varlogpods
              mountPath: /var/log/pods
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: config
              mountPath: /etc/alloy/config.alloy
              subPath: config.alloy
            - name: data
              mountPath: /var/lib/alloy/data
      volumes:
        - name: varlogcontainers
          hostPath:
            path: /var/log/containers
        - name: varlogpods
          hostPath:
            path: /var/log/pods
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
        - name: config
          configMap:
            name: {{ .Release.Name }}-alloy-config
        - name: data
          hostPath:
            path: /var/lib/alloy-data
            type: DirectoryOrCreate
{{- end }}
