metadata:
  name: {{ .Release.Name }}-redis
spec:
  type: NodePort
  selector:
    app: {{ .Release.Name }}-redis
  ports:
  - port: 6379
    nodePort: 32279
{{- else }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-redis
spec:
  type: ClusterIP
  selector:
    app: {{ .Release.Name }}-redis
  ports:
  - port: 6379
{{- end }}

---
