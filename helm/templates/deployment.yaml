                  if [ -n "$key" ]; then
                    echo "Setting: $key"
                    etcdctl --endpoints=http://{{ .Release.Name }}-etcd-headless:2379 put "$key" "$value" || true
                  fi
                done
                etcdctl --endpoints=http://{{ .Release.Name }}-etcd-headless:2379 put "$INIT_KEY" "true" || true
                echo "Config loaded successfully"
              else
                echo "Warning: $CONFIG_JSON_PATH not found"
              fi
              
              echo "=== Etcd Initialization Done: $(date) ==="
          volumeMounts:
            - name: etcd-initial-config
              mountPath: /initial-config
              readOnly: true
      containers:
        - name: exp
          image: {{ include "helm.image" (dict "imageConfig" .Values.images.rcabench "global" .Values.global) }}
          imagePullPolicy: "{{ .Values.images.rcabench.pullPolicy }}"
          command: ["/app/entrypoint.sh", "consumer"]
          env:
