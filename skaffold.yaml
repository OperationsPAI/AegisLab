apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: rcabench
profiles:
  - name: staging
    activation:
      - env: ENV_MODE=staging
    build:
      artifacts:
        - image: 10.10.10.240/library/rcabench
          context: .
          docker:
            dockerfile: src/Dockerfile
      tagPolicy:
        gitCommit:
          variant: AbbrevCommitSha
    deploy:
      helm:
        flags:
          install: ["--atomic", "--timeout=10m"]
          upgrade: ["--atomic", "--timeout=10m"]
        releases:
          - name: rcabench
            chartPath: helm
            namespace: exp
            createNamespace: true
            valuesFiles:
              - manifests/staging/rcabench.yaml
            setValueTemplates:
              images.rcabench.tag: "{{.IMAGE_TAG}}"
            setFiles:
              initialDataFiles.data_json: data/initial_data/staging/data.json
              initialDataFiles.otel_demo_yaml: data/initial_data/staging/otel-demo.yaml
              initialDataFiles.ts_yaml: data/initial_data/staging/ts.yaml
              
  - name: test
    activation:
      - env: ENV_MODE=test
    build:
      artifacts:
        - image: pair-diag-cn-guangzhou.cr.volces.com/pair/rcabench
          context: .
          docker:
            dockerfile: src/Dockerfile
      local:
        push: false
      tagPolicy:
        gitCommit:
          variant: AbbrevCommitSha
    deploy:
      helm:
        flags:
          install: ["--atomic", "--timeout=10m"]
          upgrade: ["--atomic", "--timeout=10m"]
        releases:
          - name: rcabench
            chartPath: helm
            namespace: exp
            createNamespace: true
            valuesFiles:
              - manifests/test/rcabench.yaml
            setValueTemplates:
              images.rcabench.tag: "{{.IMAGE_DIGEST}}"
            setFiles:
              initialDataFiles.data_json: data/initial_data/prod/data.json
              initialDataFiles.otel_demo_yaml: data/initial_data/prod/otel-demo.yaml
              initialDataFiles.ts_yaml: data/initial_data/prod/ts.yaml
        hooks:
          after:
            - host:
                command: ["make", "forward-ports", "ENV_MODE=test"]
                os: [darwin, linux]
            - host:
                command: ["make", "regression-test"]
                os: [darwin, linux]