global:
  imageRegistry: pair-diag-cn-guangzhou.cr.volces.com

images:
  rcabench:
    name: pair/rcabench
  jaeger:
    name: pair/jaeger
  redis:
    name: pair/redis
  mysql:
    name: pair/mysql
  etcd:
    name: pair/etcd
  busybox:
    name: pair/busybox
  buildkit:
    name: pair/buildkit
  init_data:
    name: pair/init-data

harbor:
  enabled: false

initialization:
  enabled: true

configmap:
  system:
    env_mode: "prod"
  k8s:
    init_container:
      busybox_image: pair-diag-cn-guangzhou.cr.volces.com/pair/busybox:1.35

persistence:
  storageType: volcengine

  jaeger:
    storageClass: rcabench
  redis:
    storageClass: rcabench
  mysql:
    storageClass: rcabench
  etcd:
    storageClass: rcabench
  
